services:
  vendor-server:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    ports:
      - "8001:8001"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@host.docker.internal:5432/onfood
      - JWT_SECRET=super_secret_key_for_development_purposes
      - JWT_ISSUER=onfood
      - SQL_ECHO=false
    extra_hosts:
      - "host.docker.internal:host-gateway"

  db-manager:
    build:
      context: ./db-manager
      dockerfile: Dockerfile
    restart: always
    ports:
      - "8002:8002"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@host.docker.internal:5432/onfood
      - PORT=8002
    extra_hosts:
      - "host.docker.internal:host-gateway"
